steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'OPENCLAW_EXTENSIONS=acpx'
      - '--build-arg'
      - 'OPENCLAW_INSTALL_GH_CLI=1'
      - '-t'
      - 'gcr.io/gen-lang-client-0826504762/clawdbot-gateway:$_IMAGE_TAG'
      - '.'
images:
  - 'gcr.io/gen-lang-client-0826504762/clawdbot-gateway:$_IMAGE_TAG'
substitutions:
  _IMAGE_TAG: 'latest'
options:
  machineType: 'E2_HIGHCPU_8'
